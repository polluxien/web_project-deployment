name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Setup
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build

      # Install frontend dependencies and run tests
      - name: Run Frontend Tests
        run: |
          docker-compose -f docker-compose.yml run frontend npm ci  # Install dependencies
          docker-compose -f docker-compose.yml run frontend npx playwright install  # Install Playwright browsers
          docker-compose -f docker-compose.yml run frontend npm test  # Run Playwright tests

      # Run Backend Tests
      - name: Run Backend Tests
        run: |
          docker-compose -f docker-compose.yml run backend npm ci  # Install backend dependencies
          docker-compose -f docker-compose.yml run backend npm test  # Run backend tests

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: |
          docker-compose -f docker-compose.yml up -d
